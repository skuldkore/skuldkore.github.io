name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        env:
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          status=$(curl -s -o /tmp/pages-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${PAGES_ENABLEMENT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}")

          if [ "${status}" = "404" ]; then
            echo "Enabling GitHub Pages with workflow build type..."
            curl -sSf -X POST \
              -H "Authorization: Bearer ${PAGES_ENABLEMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}" \
              -d '{"build_type":"workflow"}'
          elif [ "${status}" = "200" ]; then
            echo "GitHub Pages is already enabled."
          else
            cat /tmp/pages-response.json
            exit 1
          fi

      - name: Verify GitHub Pages is enabled
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          status=$(curl -s -o /tmp/pages-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}")

          if [ "${status}" != "200" ]; then
            echo "::error title=GitHub Pages not enabled::Enable Pages before deploying."
            echo ""
            echo "One-time setup required:"
            echo "1. Open https://github.com/${GITHUB_REPOSITORY}/settings/pages"
            echo "2. Set Build and deployment > Source to GitHub Actions"
            echo "3. Re-run this workflow from the Actions tab"
            echo ""
            echo "Optional: add a repository secret named PAGES_ENABLEMENT_TOKEN"
            echo "with a PAT that has repo or Pages write access to enable Pages automatically."
            cat /tmp/pages-response.json || true
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
